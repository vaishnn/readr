apiVersion: apps/v1
kind: Deployment
metadata:
  name: readr-frontend
  namespace: readr
  labels:
    app: readr-frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: readr-frontend
  template:
    metadata:
      labels:
        app: readr-frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image }}:{{ .Values.frontend.tag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: readr
spec:
  selector:
    app: readr-frontend
  ports:
    - port: 80
      targetPort: 80
