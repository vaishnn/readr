apiVersion: apps/v1
kind: Deployment
metadata:
  name: readr-api
  namespace: readr
  labels:
    app: readr-api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: readr-api
  template:
    metadata:
      labels:
        app: readr-api
    spec:
      containers:
        - name: api
          image: "{{ .Values.api.image }}:{{ .Values.api.tag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: {{ .Values.api.port }}
          envFrom:
            - secretRef:
                name: readr-secrets
          env:
            - name: PORT
              value: {{ .Values.api.port | quote }}
            - name: ENV
              value: {{ .Values.api.env.ENV | quote }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-svc
  namespace: readr
spec:
  selector:
    app: readr-api
  ports:
    - port: 8080
      targetPort: {{ .Values.api.port }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: readr-api-hpa
  namespace: readr
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: readr-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
