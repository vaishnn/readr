apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: readr
spec:
  serviceName: mongodb-svc
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: "{{ .Values.mongodb.image }}:{{ .Values.mongodb.tag }}"
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_DATABASE
              value: readr
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: {{ .Values.mongodb.storageClass }}
        resources:
          requests:
            storage: {{ .Values.mongodb.storageSize }}
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-svc
  namespace: readr
spec:
  selector:
    app: mongodb
  clusterIP: None
  ports:
    - port: 27017
