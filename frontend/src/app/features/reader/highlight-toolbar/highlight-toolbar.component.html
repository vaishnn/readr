<div
  class="flex items-center gap-1.5 bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 shadow-xl z-50"
  [ngStyle]="style"
>
  @for (color of colors; track color.value) {
    <button
      class="w-5 h-5 rounded-full border-2 border-transparent hover:border-white transition-all hover:scale-110"
      [class]="color.bg"
      [title]="color.label"
      (click)="colorSelected.emit(color.value)"
    ></button>
  }

  <div class="w-px h-4 bg-slate-600 mx-1"></div>

  <button
    class="text-slate-400 hover:text-white transition-colors p-0.5"
    title="Dismiss"
    (click)="dismiss.emit()"
  >
    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
    </svg>
  </button>
</div>
