<div class="flex flex-col border border-slate-600 rounded-lg overflow-hidden bg-slate-800">

  <!-- Toolbar -->
  <div class="flex items-center gap-0.5 px-2 py-1.5 border-b border-slate-700 flex-wrap">
    <button class="editor-btn font-bold" [class.active]="isActive('bold')"         (click)="toggle('toggleBold')">B</button>
    <button class="editor-btn italic"    [class.active]="isActive('italic')"        (click)="toggle('toggleItalic')">I</button>
    <button class="editor-btn underline" [class.active]="isActive('underline')"     (click)="toggle('toggleUnderline')">U</button>
    <div class="w-px h-4 bg-slate-600 mx-1"></div>
    <button class="editor-btn text-xs"  [class.active]="isActive('heading', { level: 1 })" (click)="toggle('toggleHeading')">H1</button>
    <button class="editor-btn text-xs"  [class.active]="isActive('heading', { level: 2 })" (click)="toggle('toggleHeading')">H2</button>
    <div class="w-px h-4 bg-slate-600 mx-1"></div>
    <button class="editor-btn text-xs"  [class.active]="isActive('bulletList')"    (click)="toggle('toggleBulletList')">• List</button>
    <button class="editor-btn font-mono text-xs" [class.active]="isActive('code')" (click)="toggle('toggleCode')">`code`</button>
  </div>

  <!-- Editor mount point -->
  <div #editorEl></div>

</div>

<style>
  .editor-btn {
    @apply px-2 py-1 text-sm text-slate-400 hover:text-white hover:bg-slate-700 rounded transition-colors;
  }
  .editor-btn.active {
    @apply text-white bg-slate-700;
  }
</style>
