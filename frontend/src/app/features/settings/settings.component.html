<div class="flex min-h-full bg-slate-950">
  <div class="flex flex-col flex-1 min-w-0 overflow-y-auto">

    <!-- Sticky header -->
    <header class="sticky top-0 z-20 bg-slate-900/95 backdrop-blur-sm border-b border-slate-700/40 shrink-0">
      <div class="px-7 py-4">
        <h1 class="text-xl font-semibold text-white leading-tight">Settings</h1>
      </div>
    </header>

    <!-- Content -->
    <div class="px-7 py-7 space-y-10">

      <section>
        <h2 class="text-base font-semibold text-white mb-1">Change password</h2>
        <p class="text-sm text-slate-400 mb-5">Use a strong password you don't use elsewhere.</p>

        <form class="flex flex-col gap-4" (ngSubmit)="changePassword()">
          <div>
            <label class="block text-xs text-slate-400 mb-1.5">Current password</label>
            <input
              type="password"
              class="input"
              placeholder="••••••••"
              [(ngModel)]="currentPassword"
              name="current"
              autocomplete="current-password"
            />
          </div>
          <div>
            <label class="block text-xs text-slate-400 mb-1.5">New password</label>
            <input
              type="password"
              class="input"
              placeholder="••••••••"
              [(ngModel)]="newPassword"
              name="new"
              autocomplete="new-password"
            />
          </div>
          <div>
            <label class="block text-xs text-slate-400 mb-1.5">Confirm new password</label>
            <input
              type="password"
              class="input"
              placeholder="••••••••"
              [(ngModel)]="confirmPassword"
              name="confirm"
              autocomplete="new-password"
            />
          </div>

          <div class="flex justify-end">
            <button
              type="submit"
              class="flex items-center gap-2 bg-accent-400 hover:bg-accent-300 text-slate-900 font-semibold text-sm px-4 py-2 rounded-xl transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
              [disabled]="savingPassword() || !currentPassword || !newPassword || !confirmPassword"
            >
              @if (savingPassword()) { <app-spinner size="sm" /> }
              Update password
            </button>
          </div>
        </form>
      </section>

    </div>

  </div>
</div>

<app-toast />
