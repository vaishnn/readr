<main class="max-w-2xl mx-auto px-6 py-8 flex flex-col gap-6">

  <h1 class="text-2xl font-bold text-white">Settings</h1>

  <!-- Change password -->
  <div class="card p-6">
    <h2 class="text-base font-semibold text-white mb-1">Change password</h2>
    <p class="text-sm text-slate-400 mb-5">Use a strong password you don't use elsewhere.</p>

    <form class="flex flex-col gap-4" (ngSubmit)="changePassword()">
      <div>
        <label class="block text-sm text-slate-400 mb-1">Current password</label>
        <input
          type="password"
          class="input"
          placeholder="••••••••"
          [(ngModel)]="currentPassword"
          name="current"
          autocomplete="current-password"
        />
      </div>
      <div>
        <label class="block text-sm text-slate-400 mb-1">New password</label>
        <input
          type="password"
          class="input"
          placeholder="••••••••"
          [(ngModel)]="newPassword"
          name="new"
          autocomplete="new-password"
        />
      </div>
      <div>
        <label class="block text-sm text-slate-400 mb-1">Confirm new password</label>
        <input
          type="password"
          class="input"
          placeholder="••••••••"
          [(ngModel)]="confirmPassword"
          name="confirm"
          autocomplete="new-password"
        />
      </div>

      <div class="flex justify-end">
        <button
          type="submit"
          class="btn-primary flex items-center gap-2"
          [disabled]="savingPassword() || !currentPassword || !newPassword || !confirmPassword"
        >
          @if (savingPassword()) { <app-spinner size="sm" /> }
          Update password
        </button>
      </div>
    </form>
  </div>

</main>

<app-toast />
