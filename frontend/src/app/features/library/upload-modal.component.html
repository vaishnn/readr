<!-- Backdrop -->
<div class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4" (click)="close.emit()">

  <div class="card w-full max-w-md p-6 shadow-2xl" (click)="$event.stopPropagation()">

    <div class="flex items-center justify-between mb-5">
      <h2 class="text-lg font-semibold text-white">Upload a book</h2>
      <button class="text-slate-400 hover:text-white transition-colors" (click)="close.emit()">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <div class="flex gap-4">

      <!-- Thumbnail preview -->
      <div class="shrink-0 w-24 h-32 rounded-lg overflow-hidden bg-slate-700 flex items-center justify-center border border-slate-600">
        @if (generatingThumb()) {
          <div class="w-5 h-5 border-2 border-brand-500 border-t-transparent rounded-full animate-spin"></div>
        } @else if (thumbnailUrl()) {
          <img [src]="thumbnailUrl()!" class="w-full h-full object-cover" alt="Cover preview" />
        } @else {
          <svg class="w-8 h-8 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
          </svg>
        }
      </div>

      <!-- Drop zone -->
      <div
        class="flex-1 border-2 border-dashed rounded-xl p-5 text-center transition-colors cursor-pointer flex flex-col items-center justify-center"
        [class]="dragOver() ? 'border-brand-400 bg-brand-500/10' : 'border-slate-600 hover:border-slate-400'"
        (dragover)="$event.preventDefault(); dragOver.set(true)"
        (dragleave)="dragOver.set(false)"
        (drop)="onBookFileDrop($event)"
        (click)="bookInput.click()"
      >
        @if (bookFile()) {
          <p class="text-white text-sm font-medium truncate w-full">{{ bookFile()!.name }}</p>
          <p class="text-slate-400 text-xs mt-1">{{ formatSize(bookFile()!.size) }}</p>
        } @else {
          <svg class="w-8 h-8 text-slate-500 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
          </svg>
          <p class="text-slate-300 text-sm font-medium">Drop or click to select</p>
          <p class="text-slate-500 text-xs mt-1">PDF, EPUB or CBZ</p>
        }
      </div>

    </div>

    <input #bookInput type="file" accept=".pdf,.epub,.cbz" class="hidden" (change)="onBookFileSelect($event)" />

    <!-- Actions -->
    <div class="flex justify-end gap-3 mt-5">
      <button class="btn-ghost" (click)="close.emit()">Cancel</button>
      <button
        class="btn-primary flex items-center gap-2"
        [disabled]="!bookFile() || uploading() || generatingThumb()"
        (click)="upload()"
      >
        @if (uploading()) { <app-spinner size="sm" /> }
        {{ uploading() ? 'Uploading…' : 'Upload' }}
      </button>
    </div>

  </div>
</div>
