<nav class="h-14 bg-slate-900 border-b border-slate-700/60 flex items-center px-6 gap-6 sticky top-0 z-40">
  <a routerLink="/library" class="text-lg font-bold text-white tracking-tight mr-2">Readr</a>

  <div class="flex items-center gap-1 flex-1">
    <a routerLink="/library" routerLinkActive="bg-slate-700 text-white" class="btn-ghost text-sm">
      Library
    </a>
    <a *appFeatureFlag="'collections'" routerLink="/collections" routerLinkActive="bg-slate-700 text-white" class="btn-ghost text-sm">
      Collections
    </a>
  </div>

  <div class="relative">
    <button
      class="flex items-center gap-2 hover:bg-slate-700 px-3 py-1.5 rounded-lg transition-colors"
      (click)="menuOpen = !menuOpen"
    >
      <div class="w-7 h-7 rounded-full bg-brand-500 flex items-center justify-center text-xs font-semibold text-white">
        {{ initial() }}
      </div>
      <span class="text-sm text-slate-300">{{ username() }}</span>
      <svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
      </svg>
    </button>

    @if (menuOpen) {
      <div class="absolute right-0 mt-1 w-44 card shadow-xl py-1 z-50">
        <div class="px-3 py-2 border-b border-slate-700">
          <p class="text-xs text-slate-400 truncate">{{ email() }}</p>
        </div>
        <a
          routerLink="/settings"
          class="block px-3 py-2 text-sm text-slate-300 hover:bg-slate-700 transition-colors"
          (click)="menuOpen = false"
        >
          Settings
        </a>
        <button
          class="w-full text-left px-3 py-2 text-sm text-red-400 hover:bg-slate-700 transition-colors border-t border-slate-700"
          (click)="logout()"
        >
          Sign out
        </button>
      </div>
    }
  </div>
</nav>
