<aside
  class="hidden xl:flex relative shrink-0 transition-all duration-300 ease-in-out border-l border-slate-700/40 h-full"
  [style.width]="sidebarOpen() ? '18rem' : '2.5rem'">

  <!-- Toggle button on the divider line -->
  <button
    class="absolute -left-3 top-1/2 -translate-y-1/2 z-10 w-6 h-6 rounded-full bg-slate-700 border border-slate-600 hover:bg-slate-600 flex items-center justify-center transition-colors shadow-md"
    [title]="sidebarOpen() ? 'Collapse' : 'Expand'"
    (click)="toggleSidebar()">
    <svg class="w-3 h-3 text-slate-300 transition-transform duration-300"
      [style.transform]="sidebarOpen() ? 'rotate(0deg)' : 'rotate(180deg)'"
      fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
    </svg>
  </button>

  <!-- Collapsed strip -->
  @if (!sidebarOpen()) {
    <div class="flex flex-col items-center justify-start w-full h-full pt-10">
      <span class="text-[11px] font-semibold text-slate-400 tracking-widest uppercase select-none"
        style="writing-mode: vertical-rl; transform: rotate(180deg)">
        Popular Books
      </span>
    </div>
  }

  <!-- Expanded content -->
  @if (sidebarOpen()) {
    <div class="sticky top-0 h-screen w-full overflow-y-auto px-5 py-5 space-y-6">

      <div class="flex items-center justify-between">
        <h3 class="text-[11px] font-semibold text-slate-400 tracking-widest uppercase">Popular Books</h3>
      </div>

      @if (books().length === 0) {
        <p class="text-xs text-slate-500">No books yet.</p>
      }

      <div class="grid grid-cols-2 gap-2">
        @for (book of books(); track book.id) {
          <div
            class="aspect-[2/3] rounded-xl overflow-hidden bg-slate-800 cursor-pointer hover:opacity-80 hover:scale-[1.02] transition-all duration-200 shadow-md"
            (click)="openBook(book)">
            @if (book.coverUrl) {
              <img [src]="book.coverUrl" [alt]="book.title" class="w-full h-full object-cover" />
            } @else {
              <div class="w-full h-full flex items-end p-2" [style.background]="'linear-gradient(135deg, #1e3a5f, #2d1b69)'">
                <span class="text-white text-[10px] font-medium line-clamp-2 leading-tight">{{ book.title }}</span>
              </div>
            }
          </div>
        }
      </div>

    </div>
  }

</aside>
