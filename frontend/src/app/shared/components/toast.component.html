<div class="fixed bottom-6 right-6 flex flex-col gap-2 z-50">
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      class="flex items-center gap-3 px-4 py-3 rounded-lg shadow-lg text-sm font-medium min-w-64 max-w-sm animate-slide-in"
      [class]="typeClass(toast.type)"
    >
      <span class="flex-1">{{ toast.message }}</span>
      <button
        class="opacity-60 hover:opacity-100 transition-opacity shrink-0"
        (click)="toastService.dismiss(toast.id)"
      >
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
  }
</div>
