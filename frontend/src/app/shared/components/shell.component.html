<div class="flex h-screen bg-slate-950 overflow-hidden">

  <!-- Left icon sidebar -->
  <aside class="w-16 bg-slate-900 border-r border-slate-700/50 flex flex-col items-center py-5 gap-1 shrink-0 z-40">

    <!-- Logo -->
    <a routerLink="/library" class="w-9 h-9 rounded-xl bg-accent-400 flex items-center justify-center mb-5 shrink-0 hover:bg-accent-300 transition-colors">
      <svg class="w-5 h-5 text-slate-900" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
      </svg>
    </a>

    <!-- Nav links -->
    <nav class="flex flex-col items-center gap-1 flex-1 w-full px-2">

      <a routerLink="/library"
        routerLinkActive="bg-accent-400/10 text-accent-400"
        [routerLinkActiveOptions]="{ exact: false }"
        title="Library"
        class="w-10 h-10 rounded-xl flex items-center justify-center text-slate-500 hover:text-white hover:bg-slate-700/60 transition-colors">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
            d="M8 14s-4 0-4-4 4-4 4-4m8 8s4 0 4-4-4-4-4-4M5 20V4m14 0v16M9 4v16M15 4v16"/>
        </svg>
      </a>

      <a *appFeatureFlag="'global'" routerLink="/global"
        routerLinkActive="bg-accent-400/10 text-accent-400"
        title="Global Library"
        class="w-10 h-10 rounded-xl flex items-center justify-center text-slate-500 hover:text-white hover:bg-slate-700/60 transition-colors">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
            d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </a>

      <a *appFeatureFlag="'collections'" routerLink="/collections"
        routerLinkActive="bg-accent-400/10 text-accent-400"
        title="Collections"
        class="w-10 h-10 rounded-xl flex items-center justify-center text-slate-500 hover:text-white hover:bg-slate-700/60 transition-colors">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
            d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
        </svg>
      </a>

      <a routerLink="/settings"
        routerLinkActive="bg-accent-400/10 text-accent-400"
        title="Settings"
        class="w-10 h-10 rounded-xl flex items-center justify-center text-slate-500 hover:text-white hover:bg-slate-700/60 transition-colors">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
      </a>

    </nav>

    <!-- User avatar -->
    <div class="w-8 h-8 rounded-full bg-brand-500 flex items-center justify-center text-xs font-bold text-white mb-1 shrink-0" [title]="username()">
      {{ initial() }}
    </div>

    <!-- Logout -->
    <button
      (click)="logout()"
      title="Sign out"
      class="w-10 h-10 rounded-xl flex items-center justify-center text-slate-600 hover:text-red-400 hover:bg-red-400/10 transition-colors">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
          d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
      </svg>
    </button>

  </aside>

  <!-- Main content + Popular Books sidebar -->
  <div class="flex-1 flex min-h-0 overflow-hidden">
    <div class="flex-1 flex flex-col min-h-0 overflow-hidden">
      <router-outlet />
    </div>
    <app-popular-books *appFeatureFlag="'popular-books'" />
  </div>

</div>
